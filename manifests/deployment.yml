apiVersion : apps/v1
kind: Deployment
metadata:
  name: strapiagg 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: strapiagg
  template:
    metadata:
      labels:
        app: strapiagg 
    spec:
      containers:
        - name: strapiagg 
          image: DOCKER_IMAGE
          ports:
          - containerPort: 1337
          resources:
            limits:
              memory: "2Gi"
              cpu: "1000m"
            requests:
              memory: "1Gi"
              cpu: "500m"
          envFrom:
            - secretRef:
                name: strapi-agg-env
          startupProbe:
            httpGet:
                path: /api/vauth
                port: 1337
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/vauth
              port: 1337
            initialDelaySeconds: 130
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/vauth
              port: 1337
            initialDelaySeconds: 160
            periodSeconds: 30
